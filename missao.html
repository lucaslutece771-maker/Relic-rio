<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Spectre</title>
</head>
<body>
<style>
body {
  margin: 0;
  padding: 0;
  background-image: url(./images/333371.jpg);
  font-family: "Courier New", monospace;
}
.container {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  padding: 15px;
}
.main-image, .image-slot {
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.main-image {
  width: 100%;
  height: 200px;
  margin-bottom: 20px;
}
.image-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.image-slot {
  height: 100px;
  font-size: 12px;
}
.lightbox {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}
.lightbox img {
    max-width: 90%;
    max-height: 90%;
}
.lightbox:active, .lightbox:focus {
  outline: none;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="main-image" onclick="openLightbox('img/principal.jpg')">
      <img src="./images/Briefing.png" alt="Brief" width="100%" height="100%">
    </div>
    <a href="https://www.youtube.com/watch?v=jTOxaY5FWDs">Primeira parte</a>
<h3> Arquivos de complemento Agente, nosso querido inimigo diz que isso acaba sendo mais importante que o conteudo do cofre</h3>
    
    <div class="image-grid">
      <div class="image-slot" onclick="openLightbox('img/1.jpg')">
        <img src="./images/Remap.png" width="100%" height="100%">
      </div>
      <div class="image-slot" onclick="openLightbox('img/2.jpg')">
        <img src="./images/Final down.jpeg" width="100%" height="100%">
      </div>
    </div>
  </div>


  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Zoom">
  </div>

  <script>
    function openLightbox(src) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>
</body>
</html>

</body>
</html>
